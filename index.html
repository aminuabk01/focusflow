<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusFlow — Smart Productivity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0D0D0D;
    --surface: #1A1A1A;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --border: rgba(255,255,255,0.07);
    --accent: #00FFA3;
    --accent2: #7000FF;
    --accent3: #00FFA3;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #FFFFFF;
    --text2: #A0A0A0;
    --text3: #555555;
    --glow: 0 0 30px rgba(0,255,163,0.15);
    --radius: 14px;
    --radius-sm: 8px;
  }
  /* Light Mode */
  body.light {
    --bg: #F0F2F5;
    --surface: #FFFFFF;
    --surface2: #F5F7FA;
    --surface3: #E8ECF0;
    --border: rgba(0,0,0,0.08);
    --accent: #00CC82;
    --accent2: #7000FF;
    --accent3: #00CC82;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #0D0D0D;
    --text2: #555555;
    --text3: #A0A0A0;
    --glow: 0 0 30px rgba(0,204,130,0.10);
  }
  body.light::before {
    background-image:
      linear-gradient(rgba(0,204,130,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,204,130,0.05) 1px, transparent 1px);
  }
  body.light::after {
    background: radial-gradient(circle, rgba(0,204,130,0.04) 0%, transparent 70%);
  }
  body.light .btn-ghost {
    border-color: rgba(0,0,0,0.12);
  }
  body.light .btn-ghost:hover {
    border-color: rgba(0,0,0,0.2);
    background: var(--surface3);
  }
  body.light .stat-card:hover { border-color: rgba(0,0,0,0.15); }
  body.light .card:hover { border-color: rgba(0,0,0,0.12); }

  /* Theme toggle button */
  .theme-toggle {
    width: 44px; height: 24px;
    background: var(--surface3);
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), background 0.3s;
    box-shadow: 0 0 8px rgba(0,255,163,0.4);
  }
  body.light .theme-toggle::after {
    transform: translateX(20px);
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(112,0,255,0.3);
  }
  .theme-toggle-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; margin: 0 12px 8px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .theme-toggle-label { font-size: 12px; color: var(--text2); flex: 1; font-family: 'DM Mono', monospace; }
  .theme-icon { font-size: 14px; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,163,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,163,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,255,163,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
    animation: orb 12s ease-in-out infinite alternate;
  }
  @keyframes orb {
    from { transform: translate(0,0); }
    to { transform: translate(300px, 200px); }
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

  /* Sidebar */
  .sidebar {
    width: 240px; min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 28px 0;
    position: fixed; left: 0; top: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .sidebar-logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-mark {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00FFA3, #7000FF);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(0,255,163,0.3);
  }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); font-family: 'DM Mono', monospace;
    padding: 0 12px; margin-bottom: 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.2s; color: var(--text2);
    font-size: 14px; font-weight: 600; position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(0,255,163,0.08);
    color: var(--accent);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px; background: var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent2);
    color: white; font-size: 10px; padding: 1px 7px;
    border-radius: 20px; font-family: 'DM Mono', monospace;
  }

  .sidebar-footer {
    margin-top: auto; padding: 20px 24px 0;
    border-top: 1px solid var(--border);
  }
  .tg-status {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 12px; font-size: 12px;
  }
  .tg-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .tg-info { flex: 1; }
  .tg-label { color: var(--text2); }
  .tg-name { color: var(--text); font-weight: 600; font-size: 13px; }

  /* Main */
  .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }

  /* Topbar */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
  }
  .page-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; flex: 1; }
  .page-title span { color: var(--accent); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 0.2px;
  }
  .btn-primary {
    background: var(--accent); color: #000;
    box-shadow: 0 0 20px rgba(0,255,163,0.3);
  }
  .btn-primary:hover { box-shadow: 0 0 30px rgba(0,255,163,0.5); transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface3); border-color: rgba(255,255,255,0.15); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-success { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
  .btn-success:hover { background: rgba(16,185,129,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Pages */
  .page { display: none; animation: fadeUp 0.35s ease; }
  .page.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Stats Row */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
  .stat-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.cyan::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .stat-card.purple::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .stat-card.green::before { background: linear-gradient(90deg, var(--accent3), transparent); }
  .stat-card.amber::before { background: linear-gradient(90deg, var(--warn), transparent); }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .stat-value { font-size: 36px; font-weight: 800; line-height: 1; }
  .stat-card.cyan .stat-value { color: var(--accent); }
  .stat-card.purple .stat-value { color: var(--accent2); }
  .stat-card.green .stat-value { color: var(--accent3); }
  .stat-card.amber .stat-value { color: var(--warn); }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 6px; font-family: 'DM Mono', monospace; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(255,255,255,0.12); }
  .card-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text2);
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .card-title-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Dashboard grid */
  .dash-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
  .dash-left { display: flex; flex-direction: column; gap: 20px; }
  .dash-right { display: flex; flex-direction: column; gap: 20px; }

  /* Task Item */
  .task-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease;
    transition: opacity 0.2s;
  }
  .task-item:last-child { border-bottom: none; padding-bottom: 0; }
  .task-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    transition: all 0.2s; font-size: 12px;
  }
  .task-check:hover { border-color: var(--accent); background: rgba(0,255,163,0.08); }
  .task-check.done {
    background: var(--accent3); border-color: var(--accent3); color: #000;
  }
  .task-body { flex: 1; }
  .task-title-text {
    font-size: 15px; font-weight: 600; margin-bottom: 5px;
    transition: all 0.2s;
  }
  .task-title-text.done { text-decoration: line-through; color: var(--text3); }
  .task-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tag {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    font-family: 'DM Mono', monospace; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .tag-priority-high { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
  .tag-priority-medium { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
  .tag-priority-low { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.25); }
  .tag-cat { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.25); }
  .tag-tg { background: rgba(0,255,163,0.10); color: var(--accent); border: 1px solid rgba(0,255,163,0.2); }
  .task-time { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .task-actions {
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .task-item:hover .task-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; border: none;
    background: var(--surface2); color: var(--text2);
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .icon-btn.red:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* Progress bar */
  .progress-wrap { background: var(--surface2); border-radius: 20px; height: 6px; overflow: hidden; }
  .progress-bar {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, #00FFA3, #7000FF);
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px rgba(0,255,163,0.4);
  }

  /* Countdown */
  .countdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .countdown-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden;
    transition: all 0.2s;
  }
  .countdown-card:hover { border-color: rgba(0,255,163,0.2); transform: translateY(-2px); }
  .countdown-label { font-size: 11px; color: var(--text3); margin-bottom: 12px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .countdown-name { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .countdown-display { display: flex; gap: 8px; }
  .cd-unit { text-align: center; }
  .cd-num {
    font-size: 28px; font-weight: 800; line-height: 1;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
  }
  .cd-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-top: 4px; }
  .cd-sep { font-size: 24px; font-weight: 800; color: var(--text3); line-height: 1.1; }
  .countdown-footer { margin-top: 14px; display: flex; gap: 8px; align-items: center; }
  .cd-badge { font-size: 10px; }

  /* Telegram Panel */
  .tg-panel { }
  .tg-connect-form { display: flex; flex-direction: column; gap: 14px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .input-field {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 11px 14px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; transition: all 0.2s; width: 100%;
  }
  .input-field::placeholder { color: var(--text3); }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,163,0.08); }
  select.input-field { cursor: pointer; }
  textarea.input-field { resize: vertical; min-height: 80px; }

  /* Reminders */
  .reminder-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--surface2);
    border-radius: var(--radius-sm); margin-bottom: 10px;
    border: 1px solid var(--border); animation: fadeUp 0.3s ease;
  }
  .reminder-icon { font-size: 20px; }
  .reminder-body { flex: 1; }
  .reminder-title-text { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .reminder-time { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .reminder-sent { font-size: 10px; color: var(--accent3); font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 4px; }

  /* Completed */
  .completed-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; background: var(--surface2);
    border-radius: var(--radius-sm); margin-bottom: 10px;
    border: 1px solid var(--border);
    opacity: 0.75; animation: fadeUp 0.3s ease;
  }
  .completed-check {
    width: 22px; height: 22px; background: var(--accent3);
    border-radius: 6px; display: flex; align-items: center;
    justify-content: center; font-size: 12px; flex-shrink: 0;
  }
  .completed-title { font-size: 14px; font-weight: 600; text-decoration: line-through; color: var(--text2); }
  .completed-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px; width: 480px; max-width: 95vw;
    transform: scale(0.95) translateY(10px);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  /* Toast */
  .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 18px;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
    min-width: 260px;
  }
  .toast.success { border-color: rgba(16,185,129,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }
  .toast.info { border-color: rgba(0,229,255,0.4); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(20px); }
  }

  /* Dashboard activity chart */
  .activity-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .activity-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .activity-bar {
    width: 100%; background: rgba(0,255,163,0.15);
    border-radius: 4px 4px 0 0; cursor: pointer;
    transition: background 0.2s;
    min-height: 4px;
  }
  .activity-bar:hover { background: rgba(0,255,163,0.4); }
  .activity-day { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

  /* Mobile toggle */
  .mobile-toggle {
    display: none; position: fixed; top: 16px; left: 16px;
    z-index: 200; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; width: 40px; height: 40px;
    align-items: center; justify-content: center; cursor: pointer; font-size: 18px;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--tex
